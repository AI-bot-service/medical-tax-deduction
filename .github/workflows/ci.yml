name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint (ruff + mypy)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

  # ---------------------------------------------------------------------------
  # Backend: tests (pytest with test DB)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: medvychet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/medvychet_test
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/medvychet_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-32-chars-long!!
      TELEGRAM_BOT_TOKEN: "0:fake_token_for_ci"
      YOS_BUCKET_RECEIPTS: ci-receipts
      YOS_BUCKET_PRESCRIPTIONS: ci-prescriptions
      YOS_BUCKET_EXPORTS: ci-exports
      YOS_ACCESS_KEY: fake
      YOS_SECRET_KEY: fake
      YOS_ENDPOINT_URL: http://localhost:9000
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdA==
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Frontend: lint (eslint + tsc)
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run tsc

      - name: Run build
        run: npm run build
