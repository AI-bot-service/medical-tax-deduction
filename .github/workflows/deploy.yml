name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Notify start
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            🚀 Деплой запущен
            Коммит: ${{ github.event.head_commit.message }}
            Автор: ${{ github.actor }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/medvychet' }}
            git pull origin main
            cd infra
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker compose exec -T backend alembic upgrade head
            echo "Deploy completed at $(date)"

      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ✅ Деплой успешен
            ${{ github.event.head_commit.message }}

      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ❌ Деплой провален
            ${{ github.event.head_commit.message }}
            Логи: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
