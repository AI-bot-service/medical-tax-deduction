name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Lint & Type Check ─────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check backend/
      - run: mypy backend/app --ignore-missing-imports

  # ── Tests ─────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: medvychet_test
          POSTGRES_USER: medvychet
          POSTGRES_PASSWORD: medvychet
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Tesseract, zbar)
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0 tesseract-ocr tesseract-ocr-rus

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install Python deps
        run: pip install -r backend/requirements/dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://medvychet:medvychet@localhost:5432/medvychet_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key
          FNS_MASTER_TOKEN: test-token
          YOS_ACCESS_KEY: test
          YOS_SECRET_KEY: test
          TELEGRAM_BOT_TOKEN: test
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ── Docker Build ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: medvychet/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
