# /etc/nginx/sites-available/medvychet.systemtool.online
# Symlink: ln -s /etc/nginx/sites-available/medvychet.systemtool.online /etc/nginx/sites-enabled/

upstream medvychet_backend {
    server 127.0.0.1:8000;
}

upstream medvychet_frontend {
    server 127.0.0.1:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name medvychet.systemtool.online;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name medvychet.systemtool.online;

    ssl_certificate     /etc/ssl/medvychet/fullchain.pem;
    ssl_certificate_key /etc/ssl/medvychet/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # SSE (long-lived connections)
    location ~ ^/api/v1/batch/[^/]+/stream {
        proxy_pass http://medvychet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Backend API
    location /api/ {
        proxy_pass http://medvychet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend
    location / {
        proxy_pass http://medvychet_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
