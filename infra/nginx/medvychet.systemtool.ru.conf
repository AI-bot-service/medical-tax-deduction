upstream medvychet_ru_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream medvychet_ru_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP — certbot challenge + redirect
server {
    listen 80;
    server_name medvychet.systemtool.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name medvychet.systemtool.ru;

    ssl_certificate     /etc/letsencrypt/live/medvychet.systemtool.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medvychet.systemtool.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # SSE batch stream
    location ~ ^/api/v1/batch/[^/]+/stream {
        proxy_pass http://medvychet_ru_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Next.js proxy routes (auth)
    location /api/auth/ {
        proxy_pass http://medvychet_ru_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://medvychet_ru_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Swagger docs
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://medvychet_ru_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://medvychet_ru_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
