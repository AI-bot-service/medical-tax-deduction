# Временный конфиг для получения первого SSL-сертификата.
# Используется ТОЛЬКО при первом деплое (шаг 1).
# После получения сертификата заменяется на nginx.conf.

server {
    listen 80;
    server_name medvychet.systemtool.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'waiting for ssl';
        add_header Content-Type text/plain;
    }
}
